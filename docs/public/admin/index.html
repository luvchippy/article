<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Content — LuvChippy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a10;--card-bg:rgba(255,255,255,0.02);--card-border:rgba(255,255,255,0.06);--accent:#6b7db3;--accent-soft:rgba(107,125,179,0.15);--text:rgba(255,255,255,0.87);--text-secondary:rgba(255,255,255,0.55);--text-dim:rgba(255,255,255,0.3);--success:#4ade80;--error:#f87171;--radius:12px;--radius-sm:8px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;font-weight:300;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(107,125,179,0.06),transparent);pointer-events:none;z-index:0}

/* ── Login Overlay ── */
.login-overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-card{width:360px;max-width:90vw;padding:44px 36px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);backdrop-filter:blur(20px);text-align:center}
.login-card h2{font-weight:200;font-size:1.5rem;letter-spacing:.04em;margin-bottom:28px}
.login-card input{width:100%;padding:11px 14px;margin-bottom:14px;background:rgba(255,255,255,0.04);border:1px solid var(--card-border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:.9rem;outline:none;transition:border-color .25s}
.login-card input:focus{border-color:var(--accent)}
.login-card button{width:100%;padding:11px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-family:inherit;font-size:.9rem;cursor:pointer;transition:background .25s}
.login-card button:hover{background:#7a8cc4}
.login-card button:disabled{opacity:.5;cursor:default}
.login-error{color:var(--error);font-size:.78rem;margin-bottom:12px;min-height:20px}
.login-back{display:block;margin-top:20px;color:var(--text-dim);text-decoration:none;font-size:.78rem;transition:color .2s}
.login-back:hover{color:var(--text-secondary)}

/* ── Editor ── */
.editor{display:none;max-width:800px;margin:0 auto;padding:40px 24px;position:relative;z-index:1}
.editor.active{display:block}
.editor-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--card-border)}
.editor-header h1{font-weight:200;font-size:1.5rem;letter-spacing:.04em;background:linear-gradient(135deg,var(--text),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.editor-nav{display:flex;gap:12px}
.editor-nav a{color:var(--text-secondary);text-decoration:none;font-size:.82rem;transition:color .2s}
.editor-nav a:hover{color:var(--accent)}
.editor-nav .logout{color:var(--text-dim)}
.editor-nav .logout:hover{color:var(--error)}

.msg{display:none;padding:10px 16px;border-radius:var(--radius-sm);margin-bottom:20px;font-size:.85rem}
.msg.success{display:block;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);color:var(--success)}
.msg.error{display:block;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2);color:var(--error)}

.field{margin-bottom:20px}
.field label{display:block;font-size:.72rem;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.field input,.field textarea{width:100%;padding:11px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--card-border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:.88rem;outline:none;transition:border-color .25s;resize:vertical}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{min-height:360px;line-height:1.7;font-family:monospace;font-size:.82rem}
.field .hint{font-size:.7rem;color:var(--text-dim);margin-top:6px}

.btn-row{display:flex;gap:10px;margin-top:8px}
.btn{padding:10px 24px;border:1px solid var(--card-border);border-radius:var(--radius-sm);background:var(--card-bg);color:var(--text);font-family:inherit;font-size:.85rem;cursor:pointer;transition:all .25s}
.btn:hover{background:var(--accent-soft);border-color:var(--accent)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:#7a8cc4}
.btn:disabled{opacity:.5;cursor:default}

/* ── Article List ── */
.articles-section{margin-top:48px;padding-top:24px;border-top:1px solid var(--card-border)}
.articles-section h3{font-weight:300;font-size:1rem;color:var(--text-secondary);margin-bottom:16px}
.article-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--radius-sm);transition:background .2s;margin-bottom:4px}
.article-row:hover{background:rgba(255,255,255,0.03)}
.article-row .title{font-size:.88rem;color:var(--text)}
.article-row .date{font-size:.72rem;color:var(--text-dim)}
.article-row button{background:none;border:1px solid var(--card-border);border-radius:var(--radius-sm);color:var(--text-dim);font-size:.7rem;padding:4px 10px;cursor:pointer;transition:all .2s;font-family:inherit}
.article-row button:hover{border-color:var(--error);color:var(--error)}

@media(max-width:500px){.editor{padding:24px 16px}.editor-header{flex-direction:column;align-items:flex-start;gap:12px}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
</style>
</head>
<body>

<!-- Login Overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <h2>管理后台</h2>
    <div class="login-error" id="loginError"></div>
    <input type="text" id="loginUser" placeholder="用户名" autocomplete="username">
    <input type="password" id="loginPass" placeholder="密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button id="loginBtn" onclick="doLogin()">登 录</button>
    <a href="/" class="login-back">← 返回首页</a>
  </div>
</div>

<!-- Editor -->
<div class="editor" id="editor">
  <div class="editor-header">
    <h1>✍️ 撰写文章</h1>
    <div class="editor-nav">
      <a href="/" target="_blank">预览博客</a>
      <a href="#" class="logout" onclick="doLogout()">退出</a>
    </div>
  </div>

  <div class="msg" id="msg"></div>

  <div class="field"><label>文章标识 (slug)</label><input type="text" id="slug" placeholder="my-new-post"><span class="hint">英文/数字/连字符，用于 URL：/articles/my-new-post</span></div>
  <div class="field"><label>标题</label><input type="text" id="title" placeholder="文章标题"></div>
  <div class="field"><label>标签 (逗号分隔)</label><input type="text" id="tags" placeholder="技术, 生活"></div>
  <div class="field"><label>正文 (Markdown)</label><textarea id="content" placeholder="开始写作..."></textarea></div>

  <div class="btn-row">
    <button class="btn btn-primary" id="publishBtn" onclick="publishArticle()">发布文章</button>
    <button class="btn" onclick="resetForm()">清空</button>
  </div>

  <!-- Existing articles -->
  <div class="articles-section">
    <h3>已发布文章</h3>
    <div id="articleList"></div>
  </div>
</div>

<script>
const API = '/api/articles';
let token = null;

// ── Auth ──
function isLoggedIn() {
  try {
    const t = localStorage.getItem('luvchippy-admin-token');
    if (!t) return false;
    const payload = JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    return payload.exp > Date.now()/1000;
  } catch(e) { return false; }
}

function showEditor() {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('editor').classList.add('active');
  token = localStorage.getItem('luvchippy-admin-token');
  loadArticles();
}

async function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');

  if (!u || !p) { err.textContent = '请输入用户名和密码'; return; }
  btn.disabled = true; btn.textContent = '登录中...'; err.textContent = '';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: u, password: p})
    });
    const data = await res.json();
    if (res.ok && data.token) {
      localStorage.setItem('luvchippy-admin-token', data.token);
      showEditor();
    } else {
      err.textContent = data.error || '登录失败';
      document.getElementById('loginPass').value = '';
    }
  } catch(e) {
    err.textContent = '网络错误，请重试';
  }
  btn.disabled = false; btn.textContent = '登 录';
}

function doLogout() {
  localStorage.removeItem('luvchippy-admin-token');
  location.reload();
}

// ── Articles ──
async function publishArticle() {
  const slug = document.getElementById('slug').value.trim();
  const title = document.getElementById('title').value.trim();
  const tagsRaw = document.getElementById('tags').value.trim();
  const content = document.getElementById('content').value.trim();
  const msg = document.getElementById('msg');

  if (!slug || !content) { showMsg('请填写标识和正文', 'error'); return; }

  const today = new Date().toISOString().slice(0,10);
  const tags = tagsRaw ? tagsRaw.split(',').map(s => s.trim()).filter(Boolean) : [];

  const btn = document.getElementById('publishBtn');
  btn.disabled = true; btn.textContent = '提交中...';

  try {
    const res = await fetch('/api/articles', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ slug, title: title || slug, content, tags, date: today })
    });
    const data = await res.json();
    if (res.ok && data.success) {
      showMsg('✅ 文章已发布！Cloudflare Pages 将自动部署，约 1-2 分钟生效。', 'success');
      resetForm();
      loadArticles();
    } else {
      showMsg('❌ ' + (data.error || '发布失败'), 'error');
    }
  } catch(e) {
    showMsg('❌ 网络错误', 'error');
  }
  btn.disabled = false; btn.textContent = '发布文章';
}

function resetForm() {
  document.getElementById('slug').value = '';
  document.getElementById('title').value = '';
  document.getElementById('tags').value = '';
  document.getElementById('content').value = '';
}

function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.textContent = text; m.className = 'msg ' + type;
  setTimeout(() => { m.className = 'msg'; }, 8000);
}

async function loadArticles() {
  // Fetch articles list from git tree
  try {
    const input = document.getElementById('slug');
    const list = document.getElementById('articleList');
    list.innerHTML = '<div style="color:var(--text-dim);font-size:.8rem">加载中...</div>';

    const res = await fetch('https://api.github.com/repos/luvchippy/article/contents/docs/articles?ref=main');
    if (!res.ok) { list.innerHTML = ''; return; }
    const files = await res.json();
    if (!Array.isArray(files)) { list.innerHTML = ''; return; }

    const mdFiles = files.filter(f => f.name.endsWith('.md'));
    list.innerHTML = mdFiles.map(f => {
      const name = f.name.replace('.md','');
      return `<div class="article-row">
        <span class="title">${name}</span>
        <div style="display:flex;gap:10px;align-items:center">
          <span class="date" style="display:none"></span>
          <button onclick="loadArticle('${name}')">编辑</button>
          <button onclick="deleteArticle('${name}')">删除</button>
        </div>
      </div>`;
    }).join('');
  } catch(e) { document.getElementById('articleList').innerHTML = ''; }
}

async function loadArticle(slug) {
  try {
    const res = await fetch(`https://raw.githubusercontent.com/luvchippy/article/main/docs/articles/${slug}.md`);
    if (!res.ok) return;
    const raw = await res.text();

    // Parse frontmatter
    const match = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
    if (match) {
      const fm = match[1];
      const body = match[2];
      const titleMatch = fm.match(/title:\s*"?(.+?)"?\n/);
      const tagsMatch = fm.match(/tags:\s*\[(.+?)\]/);
      document.getElementById('slug').value = slug;
      document.getElementById('title').value = titleMatch ? titleMatch[1] : '';
      document.getElementById('tags').value = tagsMatch ? tagsMatch[1].replace(/"/g,'') : '';
      document.getElementById('content').value = body.trim();
    } else {
      document.getElementById('slug').value = slug;
      document.getElementById('content').value = raw;
    }
    window.scrollTo({top:0, behavior:'smooth'});
  } catch(e) {}
}

async function deleteArticle(slug) {
  if (!confirm(`确定删除「${slug}」？此操作不可撤销。`)) return;
  try {
    const res = await fetch('/api/articles', {
      method: 'DELETE',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ slug, action: 'delete' })
    });
    const data = await res.json();
    if (res.ok) {
      showMsg('✅ 已删除', 'success');
      loadArticles();
    } else {
      showMsg('❌ ' + (data.error || '删除失败'), 'error');
    }
  } catch(e) { showMsg('❌ 网络错误', 'error'); }
}

// ── Init ──
if (isLoggedIn()) showEditor();
</script>
</body>
</html>
